events {
    worker_connections 1024;
}

http {
    # HTTP server - redirect to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server for Expo web app and API
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/localhost+3.pem;
        ssl_certificate_key /etc/nginx/certs/localhost+3-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # Docker DNS resolver
        resolver 127.0.0.11 valid=10s;

        # WebSocket proxy for annotations
        location /ws/ {
            set $api_backend api:8443;
            proxy_pass https://$api_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
            proxy_read_timeout 86400;
        }

        # Proxy API requests to FastAPI backend
        location /api/ {
            set $api_backend api:8443;
            proxy_pass https://$api_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_verify off;
        }

        # API docs
        location /docs {
            set $api_backend api:8443;
            proxy_pass https://$api_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_ssl_verify off;
        }

        location /openapi.json {
            set $api_backend api:8443;
            proxy_pass https://$api_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_ssl_verify off;
        }

        # Proxy to Expo dev server
        location / {
            proxy_pass http://host.docker.internal:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket support for Expo dev tools
        location /_next/webpack-hmr {
            proxy_pass http://host.docker.internal:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}
