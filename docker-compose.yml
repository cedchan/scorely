services:
  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scorely-api
    ports:
      - "8000:8000"
      - "8443:8443"
    volumes:
      - ./backend:/app
      - ./backend/cloud:/app/cloud
      - ./certs:/app/certs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUDIVERIS_HOST=audiveris
      - AUDIVERIS_PORT=8081
      - SSL_KEYFILE=/app/certs/localhost+3-key.pem
      - SSL_CERTFILE=/app/certs/localhost+3.pem
    depends_on:
      - audiveris
    networks:
      - scorely-network
    command: uvicorn main:app --host 0.0.0.0 --port 8443 --reload --ssl-keyfile=/app/certs/localhost+3-key.pem --ssl-certfile=/app/certs/localhost+3.pem

  # Audiveris OMR Service (Built from source with Java 25)
  audiveris:
    build:
      context: .
      dockerfile: backend/Dockerfile.audiveris
    container_name: scorely-audiveris
    volumes:
      # Shared cloud directory for PDFs and MusicXML outputs
      - ./backend/cloud:/audiveris/cloud
    environment:
      - TESSDATA_PREFIX=/usr/share/tessdata
    networks:
      - scorely-network
    # Container stays running and waits for exec commands

  # Nginx HTTPS Proxy for Expo Web App
  nginx:
    image: nginx:alpine
    container_name: scorely-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - scorely-network

networks:
  scorely-network:
    driver: bridge

volumes:
  cloud:
